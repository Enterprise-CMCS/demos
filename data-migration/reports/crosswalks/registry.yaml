      rfrnc_table: mdcd_dlvrbl_stus_rfrnc
      rfrnc_code_column: mdcd_dlvrbl_stus_cd
      rfrnc_name_column: mdcd_dlvrbl_stus_name
      crosswalk_code_column: legacy_int_cd
      crosswalk_name_column: legacy_name
