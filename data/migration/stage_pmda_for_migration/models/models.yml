version: 2

models:
  # Final Models
  - name: final_demos_app_application_phase
    columns:
      - name: application_id
        data_type: uuid
      - name: phase_id
        data_type: text
      - name: phase_status_id
        data_type: text
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz

  - name: final_demos_app_application
    columns:
      - name: id
        data_type: uuid
      - name: application_type_id
        data_type: text
      - name: is_migrated_from_pmda
        data_type: boolean

  - name: final_demos_app_deliverable_demonstration_type
    columns:
      - name: deliverable_id
        data_type: uuid
      - name: demonstration_id
        data_type: uuid
      - name: demonstration_type_tag_name_id
        data_type: text

  - name: final_demos_app_deliverable
    columns:
      - name: id
        data_type: uuid
      - name: deliverable_type_id
        data_type: text
        data_tests:
          - not_null:
              name: assert_no_missing_deliverable_types_in_final_table
      - name: name
        data_type: text
      - name: demonstration_id
        data_type: uuid
        data_tests:
          - not_null:
              name: assert_no_missing_demonstration_ids_in_final_deliverable_table
      - name: demonstration_status_id
        data_type: text
      - name: status_id
        data_type: text
        data_tests:
          - not_null:
              name: assert_no_missing_status_ids_in_final_deliverable_table
      - name: cms_owner_user_id
        data_type: uuid
        data_tests:
          - not_null:
              name: assert_no_missing_owner_ids_in_final_deliverable_table
      - name: cms_owner_person_type_id
        data_type: text
      - name: due_date
        data_type: timestamptz
      - name: due_date_type_id
        data_type: text
      - name: expected_to_be_submitted
        data_type: bool
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz
      - name: _legacy_mdcd_demo_id
        data_type: integer
      - name: _legacy_mdcd_dlvrbl_id
        data_type: integer

  - name: final_demos_app_demo_role_assignment
    columns:
      - name: person_id
        data_type: uuid
        data_tests:
          - not_null:
              name: assert_proj_ofcr_user_id_maps_to_cleaned_person
      - name: demonstration_id
        data_type: uuid
      - name: role_id
        data_type: text
      - name: state_id
        data_type: text
      - name: person_type_id
        data_type: text
      - name: grant_level_id
        data_type: text
      - name: _internal_grant_type
        data_type: text
        description: Internal flag used for filtering downstream models.

  - name: final_demos_app_demo_type_tag_assignment
    columns:
      - name: demonstration_id
        data_type: uuid
      - name: tag_name_id
        data_type: text
      - name: tag_type_id
        data_type: text
      - name: effective_date
        data_type: timestamptz
      - name: expiration_date
        data_type: timestamptz
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz

  - name: final_demos_app_demonstration
    columns:
      - name: id
        data_type: uuid
      - name: application_type_id
        data_type: text
      - name: name
        data_type: text
      - name: description
        data_type: text
      - name: effective_date
        data_type: timestamptz
      - name: expiration_date
        data_type: timestamptz
      - name: sdg_division_id
        data_type: text
      - name: signature_level_id
        data_type: text
      - name: status_id
        data_type: text
      - name: status_updated_at
        data_type: timestamptz
      - name: current_phase_id
        data_type: text
      - name: state_id
        data_type: text
      - name: clearance_level_id
        data_type: text
      - name: medicaid_id
        data_type: text
        data_tests:
          - unique:
              name: assert_medicaid_ids_are_unique
      - name: chip_id
        data_type: text
        data_tests:
          - unique:
              name: assert_chip_ids_are_unique
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz
      - name: _legacy_mdcd_demo_id
        data_type: integer
      - name: _legacy_proj_ofcr_user_id
        data_type: integer
        description: The legacy user ID of the project officer; when null or 0, fall back to 828 (Liz Hill).

  - name: final_demos_app_person_state
    description: All cleaned person-state relations with state users and valid states
    columns:
      - name: person_id
        data_type: uuid
        data_tests:
          - relationships:
              name: assert_person_state_person_exists_in_person
              arguments:
                to: ref('final_demos_app_person')
                field: id
      - name: state_id
        data_type: text
        data_tests:
          - relationships:
              name: assert_person_state_state_exists_in_demos_app_state
              arguments:
                to: source('demos_app', 'state')
                field: id
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: assert_person_state_is_unique
          arguments:
            combination_of_columns:
              - person_id
              - state_id

  - name: final_demos_app_person
    description: This is the cleaned data from PMDA prepared for insert into demos_app.person. Users were initially selected from the `users` table in PMDA where the `active` flag was set to 1.
    columns:
      - name: id
        data_type: uuid
      - name: person_type_id
        data_type: text
        description: In cases where a PMDA set of roles resolves to more than one DEMOS person_type_id, the highest person_type_id was chosen. If no person type could be generated, the user is filtered out.
        data_tests:
          - not_null:
              name: assert_no_missing_person_type_id_in_cleaned_demos_app_person
      - name: email
        data_type: text
        description: Users with missing email addresses are filtered out, as are those with empty string or not passing basic format checking.
        data_tests:
          - not_null:
              name: assert_no_missing_email_in_cleaned_demos_app_person
      - name: first_name
        data_type: text
        description: Users with missing first names are filtered out.
        data_tests:
          - not_null:
              name: assert_no_missing_first_name_in_cleaned_demos_app_person
      - name: last_name
        data_type: text
        description: Users with missing last names are filtered out.
        data_tests:
          - not_null:
              name: assert_no_missing_last_name_in_cleaned_demos_app_person
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz
      - name: _legacy_id
        data_type: integer

  - name: final_demos_app_primary_demo_role_assignment
    columns:
      - name: person_id
        data_type: uuid
      - name: demonstration_id
        data_type: uuid
      - name: role_id
        data_type: text

  - name: final_demos_app_system_role_assignment
    description: default system role assignment derived from IDM role
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: assert_system_role_assignment_is_unique
          arguments:
            combination_of_columns:
              - person_id
              - role_id
    columns:
      - name: person_id
        data_type: uuid
        data_tests:
          - relationships:
              name: assert_system_role_assignment_person_exists_in_person
              arguments:
                to: ref('final_demos_app_person')
                field: id
      - name: role_id
        data_type: text
        data_tests:
          - relationships:
              name: assert_system_role_assignment_role_exists_in_demos_app_system_role
              arguments:
                to: source('demos_app', 'role')
                field: id
      - name: person_type_id
        data_tests:
          - relationships:
              name: assert_system_role_assignment_person_type_exists_in_demos_app_person_type
              arguments:
                to: source('demos_app', 'person_type')
                field: id
        data_type: text
      - name: grant_level_id
        data_type: text
        data_tests:
          - accepted_values:
              name: assert_system_role_assignment_grant_level_id_is_system
              arguments:
                values:
                  - System

  - name: final_demos_app_tag_name
    columns:
      - name: id
        data_type: text
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz

  - name: final_demos_app_tag
    columns:
      - name: tag_name_id
        data_type: text
      - name: tag_type_id
        data_type: text
      - name: source_id
        data_type: text
      - name: status_id
        data_type: text
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz

  - name: final_demos_app_users
    description: This is the cleaned data from PMDA prepared for insert into demos_app.users; this is derived entirely from `final_demos_app_person`.
    data_tests:
      - dbt_utils.expression_is_true:
          name: assert_cognito_subject_always_null_in_cleaned_demos_app_users
          arguments:
            expression: "cognito_subject IS NULL"
      - dbt_utils.expression_is_true:
          name: assert_username_always_null_in_cleaned_demos_app_users
          arguments:
            expression: "username IS NULL"
      - dbt_utils.expression_is_true:
          name: assert_is_migrated_from_pmda_always_true_in_cleaned_demos_app_users
          arguments:
            expression: "is_migrated_from_pmda = TRUE"
      - dbt_utils.expression_is_true:
          name: assert_has_logged_in_always_false_in_cleaned_demos_app_users
          arguments:
            expression: "has_logged_in = FALSE"
    columns:
      - name: id
        data_type: uuid
      - name: person_type_id
        data_type: text
        data_tests:
          - not_null:
              name: assert_person_type_id_not_null_in_cleaned_demos_app_users
          - relationships:
              name: assert_person_type_id_in_allowed_user_types_in_cleaned_demos_app_users
              arguments:
                to: source('demos_app', 'user_person_type_limit')
                field: id
      - name: cognito_subject
        data_type: uuid
      - name: username
        data_type: text
      - name: is_migrated_from_pmda
        data_type: boolean
      - name: has_logged_in
        data_type: boolean
      - name: created_at
        data_type: timestamptz
      - name: updated_at
        data_type: timestamptz

  # Cleaned Models
  - name: cleaned_demos_app_demonstration_finalized_demos
    data_tests:
      - dbt_utils.expression_is_true:
          name: assert_all_cleaned_finalized_demonstrations_are_approved
          arguments:
            expression: "status_id = 'Approved'"
      - dbt_utils.expression_is_true:
          name: assert_all_cleaned_finalized_demonstrations_have_effective_date
          arguments:
            expression: "status_id = 'Approved' AND effective_date IS NOT NULL"
      - dbt_utils.expression_is_true:
          name: assert_all_cleaned_finalized_demonstrations_have_expiration_date
          arguments:
            expression: "status_id = 'Approved' AND expiration_date IS NOT NULL"

  # Apps Models
  - name: apps_active_finalized_pmda_demos
    columns:
      - name: mdcd_demo_id
        data_type: integer
        data_tests:
          - unique:
              name: assert_active_finalized_pmda_demos_have_unique_ids
      - name: mdcd_chip_div_cd
        data_type: integer
        data_tests:
          - not_null:
              name: assert_active_finalized_pmda_demos_have_no_missing_mdcd_chip_div_id
      - name: mdcd_demo_stus_cd
        data_type: integer
        data_tests:
          - not_null:
              name: assert_active_finalized_pmda_demos_have_no_missing_mdcd_demo_stus_cd
          - accepted_values:
              name: assert_active_finalized_pmda_demos_have_only_approved_expired_mdcd_demo_stus_cd
              arguments:
                values: [2, 6]
      - name: demo_stus_dt
        data_type: date
        data_tests:
          - not_null:
              name: assert_active_finalized_pmda_demos_have_no_missing_demo_stus_dt

  - name: apps_active_in_progress_pmda_demos
    columns:
      - name: mdcd_pendg_demo_id
        data_type: integer
        data_tests:
          - unique:
              name: assert_active_in_progress_pmda_demos_have_unique_ids
      - name: mdcd_chip_div_cd
        data_type: integer
        data_tests:
          - not_null:
              name: assert_active_in_progress_pmda_demos_have_no_missing_mdcd_chip_div_id
      - name: mdcd_demo_aplctn_stus_cd
        data_type: integer
        data_tests:
          - not_null:
              name: assert_active_in_progress_pmda_demos_have_no_missing_mdcd_demo_aplctn_stus_cd
      - name: mdcd_demo_aplctn_stus_dt
        data_type: date
        data_tests:
          - not_null:
              name: assert_active_in_progress_pmda_demos_have_no_missing_mdcd_demo_aplctn_stus_dt

  # Users Models
  - name: users_active_pmda_users
    columns:
      - name: id
        data_tests:
          - unique:
              name: assert_pmda_user_id_is_unique

  - name: users_cleaned_demos_app_person_state_user
    description: All cleaned people records that are of type demos-state-user
    columns:
      - name: person_type_id
        data_tests:
          - accepted_values:
              name: assert_person_type_id_is_demos_state_user_in_users_cleaned_demos_app_person_state_user
              arguments:
                values:
                  - demos-state-user
