version: 2

models:
  - name: cleaned_demos_app_person
    columns:
      - name: id
      - name: person_type_id
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: email
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: first_name
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: last_name
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: created_at
      - name: updated_at

  - name: cleaned_demos_app_users
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "cognito_subject IS NULL"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "username IS NULL"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_migrated_from_pmda = TRUE"
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: "has_logged_in = FALSE"
          config:
            severity: warn
    columns:
      - name: id
      - name: person_type_id
        data_tests:
          - not_null
      - name: cognito_subject
      - name: username
      - name: is_migrated_from_pmda
      - name: has_logged_in
      - name: created_at
      - name: updated_at
