name: 'stage_pmda_for_migration'
version: '1.0.0'
profile: 'stage_pmda_for_migration'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  stage_pmda_for_migration:
    +materialized: table
    errors:
      +docs:
        node_color: "crimson"
    cleaned:
      +docs:
        node_color: "teal"
      final:
        +docs:
          node_color: "midnightblue"
        +tags: ['final']
        +contract:
          enforced: true

seeds:
  stage_pmda_for_migration:
    +tags: ['source_in_use']
    +docs:
      node_color: "darkviolet"

tests:
  +docs:
    node_color: "darkred"

flags:
  partial_parse: false
