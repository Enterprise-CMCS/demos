[tool.coverage.run]
omit = [
    "*/test_*.py"
]

[tool.pytest.ini_options]
python_files = "test_*.py"
pythonpath = ["."]
addopts = "--mocha --cov=. --cov-report html:.cov.html --cov-report term-missing --cov-fail-under=80"

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py311"
output-format = "concise"

[tool.ruff.lint]
select = ["E", "W", "F", "B", "D", "Q", "DOC"]
preview = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["D", "DOC"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pydoclint]
style = "google"
exclude = "test_.*\\.py$"

[tool.mypy]
python_version = "3.11"
exclude = [
    "test_.*\\.py$"
]
