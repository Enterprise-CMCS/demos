[tool.coverage.run]
omit = [
    "*/test_*.py",
    "*/history_trigger_generator.py"
]

[tool.pytest.ini_options]
python_files = "test_*.py"
pythonpath = ["."]
addopts = "--mocha --cov=. --cov-report html:.cov.html --cov-report term-missing"

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py313"
output-format = "concise"

[tool.ruff.lint]
select = ["E", "W", "F", "B", "D", "Q", "DOC"]
preview = true
unfixable = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.per-file-ignores]
"test_*.py" = ["D", "DOC"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pydoclint]
style = "google"
exclude = "test_.*\\.py$"

[tool.mypy]
python_version = "3.13"
check_untyped_defs = true
