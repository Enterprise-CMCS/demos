name: Sync Snyk Code Findings to Jira

on:
  push:
    branches:
      - DEMOS-2175-snyk-code-pipeline
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env: 
      ENVS_HERE: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: node pipelines/sync-snyk-code-to-jira.mts
